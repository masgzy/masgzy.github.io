<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="res/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="res/favicon.svg">
  <link rel="apple-touch-icon" href="res/favicon-180.png">
  <title>Kryp首页</title>
  <link rel="stylesheet" href="res/design/index.css" />
  <link rel="stylesheet" href="res/index/index.css" />
  <script src="res/design/theme.js"></script>
</head>
<body>
  <!-- 背景装饰圆形 -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">Kryp</h1>
      <p class="page-subtitle">探索与发现</p>
    </header>
    <div id="cards-container">
      <div class="card">
        <a class="card-left" href="/down">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;opacity:0.75"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <div class="card-text">
            <div class="card-title">下载页</div>
            <div class="card-description">文件</div>
          </div>
        </a>
        <a class="card-button" href="/down">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="/movie">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;opacity:0.75"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
          </div>
          <div class="card-text">
            <div class="card-title">影视播放</div>
            <div class="card-description">精选影视资源</div>
          </div>
        </a>
        <a class="card-button" href="/movie">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="/bti">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M9.8 4.8c-3 0-5 2.25-5 5.35 0 2.25 1.1 3.95 2.65 4.8v3.45h4.3v-2.35h1.75c1.05 0 1.8-.75 1.8-1.8v-1.1h1.35c.55 0 .85-.62.52-1.06l-1.87-2.54c-.3-2.74-2.25-4.75-5.5-4.75Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
              <path d="M18.6 5.4h1.9M18.6 9.2h1.9M18.6 13h1.9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
              <circle cx="7.9" cy="9.2" r="1.05" fill="currentColor" opacity="0.42"/>
              <circle cx="11" cy="8.15" r="1.05" fill="currentColor" opacity="0.72"/>
              <circle cx="11.8" cy="11.4" r="1.05" fill="currentColor" opacity="0.52"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">XBTI</div>
            <div class="card-description">一系列XBTI测试</div>
          </div>
        </a>
        <a class="card-button" href="/bti">前往</a>
      </div>
    </div>
  </div>

  <script src="res/index/config.js"></script>
  <script src="res/vendor/anime.min.js"></script>
  <script src="res/common/gyroscope.js"></script>
  <script src="res/common/glass-animations.js"></script>
  <script src="res/index/app.js"></script>
</body>
</html>
