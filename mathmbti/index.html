<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🧠 MBTI · 数学脑型指标</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(145deg, #1a2f1d 0%, #0e1a0f 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 20px 12px 40px;
      color: #e3f0da;
    }
    .container { max-width: 680px; margin: 0 auto; }
    .header { margin-bottom: 24px; text-align: center; }
    h1 {
      font-size: 2.4rem; font-weight: 800; letter-spacing: 2px;
      background: linear-gradient(135deg, #d4edc9, #b1dfa7);
      -webkit-background-clip: text; background-clip: text;
      color: transparent; text-shadow: 0 4px 12px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;
    }
    h1 span {
      background: #2a4530; padding: 2px 14px; border-radius: 60px;
      font-size: 1rem; color: #c0e0b2; font-weight: 400;
    }
    .sub { color: #b1cfaa; font-style: italic; margin-top: 6px; border-bottom: 1px dashed #3c6e4a; padding-bottom: 12px; }
    
    /* 封面卡片 */
    .cover-card {
      background: rgba(25, 45, 28, 0.95);
      backdrop-filter: blur(4px);
      border: 1px solid #437a4a;
      border-radius: 36px;
      padding: 32px 24px;
      box-shadow: 0 20px 30px -8px #030503, 0 0 0 1px #2e5a33 inset;
      margin-bottom: 20px;
      text-align: center;
    }
    .cover-icon {
      font-size: 5rem;
      margin-bottom: 10px;
    }
    .cover-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #e6ffd9;
      margin-bottom: 12px;
    }
    .cover-desc {
      color: #bde5b2;
      font-size: 1.1rem;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .cover-features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 25px 0;
      flex-wrap: wrap;
    }
    .feature-item {
      background: #1e351e;
      border-radius: 30px;
      padding: 8px 20px;
      border: 1px solid #5a9e5a;
      color: #d2f0c2;
      font-weight: 500;
    }
    .btn-start {
      background: #3f7842;
      border: none;
      border-bottom: 6px solid #1c3a1c;
      color: white;
      padding: 18px 30px;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 80px;
      cursor: pointer;
      width: 100%;
      transition: 0.1s;
      box-shadow: 0 8px 12px #030803;
      border: 1px solid #7fbf7f;
      margin-top: 20px;
    }
    .btn-start:active {
      transform: translateY(3px);
      box-shadow: 0 3px 6px #030803;
      border-bottom-width: 3px;
    }

    .progress-area {
      background: #1f321f; border-radius: 40px; padding: 8px 16px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: inset 0 2px 5px #0a130b, 0 6px 10px rgba(0,0,0,0.3);
    }
    .progress-text { font-weight: 600; color: #d2f0c2; }
    .progress-bar-bg { flex: 1; margin: 0 15px; height: 10px; background: #0e1f10; border-radius: 20px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #8fc97f, #c0f0a8); border-radius: 20px; transition: width 0.2s; }
    .card {
      background: rgba(25, 45, 28, 0.9); backdrop-filter: blur(4px);
      border: 1px solid #437a4a; border-radius: 36px; padding: 28px 20px;
      box-shadow: 0 20px 30px -8px #030503, 0 0 0 1px #2e5a33 inset;
      margin-bottom: 20px;
    }
    .question-header { display: flex; justify-content: space-between; color: #aad6a0; margin-bottom: 20px; font-weight: 500; }
    .q-text { font-size: 1.4rem; font-weight: 600; line-height: 1.4; margin-bottom: 30px; color: #f0ffe6; text-shadow: 0 2px 3px black; }
    .options { display: flex; flex-direction: column; gap: 14px; }
    .option {
      background: #1d301d; border: 1.5px solid #386e3e; border-radius: 50px;
      padding: 14px 22px; font-size: 1.05rem; color: #e2f3da; cursor: pointer;
      transition: all 0.15s; box-shadow: 0 4px 0 #0c170c; font-weight: 500;
      display: flex; align-items: center; gap: 12px;
    }
    .option:hover { background: #2a482a; border-color: #6daa6d; }
    .option.selected {
      background: #3f7842; border-color: #b1e6a3;
      box-shadow: 0 0 12px #8fc97f88, 0 4px 0 #1c3a1c; color: white;
    }
    .option-prefix {
      font-weight: 800; background: #0f1f0f; width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; color: #c3e0b3; border: 1px solid #5f9462;
    }
    .option.selected .option-prefix { background: #1d451d; color: white; border-color: #bef5b0; }
    .nav-buttons { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; }
    .btn {
      background: #283e28; border: none; border-bottom: 4px solid #0f1f0f;
      color: #e2f3da; padding: 14px 24px; font-size: 1.1rem; font-weight: bold;
      border-radius: 60px; cursor: pointer; flex: 1; text-align: center;
      transition: 0.1s; box-shadow: 0 6px 8px #030803; border: 1px solid #437a4a;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 2px 4px #030803; border-bottom-width: 2px; }
    .btn:disabled { opacity: 0.5; pointer-events: none; filter: grayscale(0.6); }
    .btn.highlight { background: #58855a; border-color: #b1e6a3; color: white; }
    .result-panel {
      background: #1b301b; border-radius: 32px; padding: 24px 18px;
      border: 2px solid #6b9e6b; margin-top: 20px; box-shadow: 0 10px 20px black;
    }
    .type-badge {
      font-size: 2.2rem; font-weight: 900; background: #294f29;
      display: inline-block; padding: 6px 22px; border-radius: 60px;
      margin-bottom: 12px; border: 2px solid #9ad09a; color: #f5fff0;
    }
    .type-english { font-size: 1.3rem; color: #bde5b2; margin-bottom: 16px; letter-spacing: 2px; }
    .type-desc {
      font-size: 1.2rem; padding: 16px 10px; background: #102010;
      border-radius: 28px; border-left: 8px solid #84c784;
      font-style: italic; margin: 18px 0; color: #daf0d0;
    }
    .rank-list {
      margin: 20px 0 10px;
      background: #0e1e0e; border-radius: 20px; padding: 16px;
    }
    .rank-item {
      display: flex; align-items: baseline; gap: 10px;
      padding: 8px 0; border-bottom: 1px dotted #3f6e3f;
    }
    .rank-number { font-size: 1.4rem; font-weight: bold; color: #b1dfa7; min-width: 32px; }
    .rank-info { flex: 1; }
    .rank-type { font-size: 1.2rem; font-weight: 600; }
    .rank-eng { font-size: 0.9rem; color: #9cc09c; }
    .rank-score { font-weight: bold; color: #e0f0d0; }
    .restart-btn { margin-top: 24px; width: 100%; }
    .small-note { color: #8ab582; margin: 10px 0; font-size: 0.9rem; }
    .icon-btn {
      background: none; border: 1px solid #517a51; color: #bfdfb3;
      padding: 8px 16px; border-radius: 30px; font-size: 0.9rem; cursor: pointer;
    }
    footer { margin-top: 30px; text-align: center; color: #6e9e6e; }
    .hidden { display: none !important; }
  </style>
</head>

<div class="container">
  <div class="header">
    <h1>🧮 MBTI <span>Math Brain Type Indicator</span></h1>

  </div>

    </div>
    <div style="margin-top: 16px; text-align: center;">
      <button class="btn highlight hidden" id="submitBtn">✨ 查看结果 ✨</button>
    </div>
  </div>

  <div id="resultPanel" class="result-panel hidden">

      <span style="font-size:1.8rem;">🧪</span>

    <div id="topThreeList" class="rank-list"></div>

    <p class="small-note" style="margin-top:16px;">* 加权计分 · 25题 · 16种人格</p>
  </div>
  <footer>📐 加权计分 · 25题 · 16种人格</footer>
</div>

    const typeDefinitions = {
      "民间高人": { eng: "Folk Math Guru", desc: "“哥猜是我的宇宙，空白处太小写不下。”" },
      "数学老师": { eng: "Math Sensei", desc: "“板书即正义，这题我讲了八百遍。”" },

    };

    // 状态
    let currentIndex = 0;
    let answers = new Array(25).fill(null);
    let typeScores = {};

    // DOM 元素
    const coverCard = document.getElementById('coverCard');
    const progressArea = document.getElementById('progressArea');
    const quizCard = document.getElementById('quizCard');
    const resultPanel = document.getElementById('resultPanel');
    const qText = document.getElementById('questionText');
    const optionsDiv = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const progressCount = document.getElementById('progress-count');
    const progressFill = document.getElementById('progress-fill');
    const qNumSpan = document.getElementById('qNum');
    const resetBtn = document.getElementById('resetBtn');
    const restartBtn = document.getElementById('restartBtn');
    const startBtn = document.getElementById('startBtn');

    function initScores() {
      typeScores = {};
      Object.keys(typeDefinitions).forEach(t => typeScores[t] = 0);
    }
    initScores();

    function updateProgress() {
      const answered = answers.filter(a => a !== null).length;
      progressCount.innerText = `${answered} / 25`;
      progressFill.style.width = (answered / 25 * 100) + '%';
      qNumSpan.innerText = `第 ${currentIndex+1} 题`;
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      qText.innerText = q.text;
      const selectedIdx = answers[currentIndex];
      let html = '';
      q.options.forEach((opt, idx) => {
        const selectedClass = (selectedIdx === idx) ? 'selected' : '';
        const prefix = String.fromCharCode(65 + idx);
        html += `<div class="option ${selectedClass}" data-opt-index="${idx}"><span class="option-prefix">${prefix}</span> ${opt}</div>`;
      });
      optionsDiv.innerHTML = html;
      document.querySelectorAll('.option').forEach(opt => {
        opt.addEventListener('click', (e) => {
          selectOption(currentIndex, parseInt(opt.dataset.optIndex));
        });
      });
      prevBtn.disabled = (currentIndex === 0);
      if (currentIndex === 24) {
        nextBtn.classList.add('hidden');
        submitBtn.classList.remove('hidden');
      } else {
        nextBtn.classList.remove('hidden');
        submitBtn.classList.add('hidden');
      }
      updateProgress();
    }

    function selectOption(qIdx, optIdx) {
      answers[qIdx] = optIdx;
      renderQuestion();
    }

    function goPrev() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }
    function goNext() { if (currentIndex < 24) { currentIndex++; renderQuestion(); } }

    function computeScores() {
      initScores();
      for (let i = 0; i < 25; i++) {
        const ans = answers[i];
        if (ans === null) continue;
        const items = questions[i].types[ans];
        items.forEach(item => {
          const t = item.name;
          const w = item.weight || 1;
          if (typeScores.hasOwnProperty(t)) typeScores[t] += w;
          else typeScores[t] = w;
        });
      }
    }

    function showResult() {
      computeScores();
      const sorted = Object.entries(typeScores).sort((a,b) => b[1] - a[1]);
      const topType = sorted[0][0];
      const topEng = typeDefinitions[topType]?.eng || topType;
      const topDesc = typeDefinitions[topType]?.desc || "未知类型";
      document.getElementById('resultType').innerText = topType;
      document.getElementById('resultEng').innerText = topEng;
      document.getElementById('resultDesc').innerText = topDesc;

      const topThree = sorted.slice(0, 3);
      let listHtml = '';
      topThree.forEach(([type, score], idx) => {
        const info = typeDefinitions[type] || { eng: type, desc: '' };
        listHtml += `<div class="rank-item">
          <span class="rank-number">#${idx+1}</span>
          <div class="rank-info">
            <div class="rank-type">${type}</div>
            <div class="rank-eng">${info.eng}</div>
          </div>
          <span class="rank-score">${score} 分</span>
        </div>`;
      });
      document.getElementById('topThreeList').innerHTML = listHtml;

      quizCard.classList.add('hidden');
      progressArea.classList.add('hidden');
      resultPanel.classList.remove('hidden');
    }

    function allAnswered() { return answers.every(a => a !== null); }
    function handleSubmit() {
      if (!allAnswered()) { alert('还有题目没选完呢！'); return; }
      showResult();
    }

    // 重置并开始新测试 (从封面状态)
    function startNewTest() {
      answers = new Array(25).fill(null);
      currentIndex = 0;
      initScores();
      coverCard.classList.add('hidden');
      resultPanel.classList.add('hidden');
      progressArea.classList.remove('hidden');
      quizCard.classList.remove('hidden');
      renderQuestion();
    }

    function resetToCover() {
      coverCard.classList.remove('hidden');
      progressArea.classList.add('hidden');
      quizCard.classList.add('hidden');
      resultPanel.classList.add('hidden');
      answers = new Array(25).fill(null);
      currentIndex = 0;
      initScores();
    }

    // 事件绑定
    startBtn.addEventListener('click', startNewTest);
    resetBtn.addEventListener('click', resetToCover);
    restartBtn.addEventListener('click', resetToCover);
    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);
    submitBtn.addEventListener('click', handleSubmit);

    // 键盘支持
    window.addEventListener('keydown', (e) => {
      if (!quizCard.classList.contains('hidden') && resultPanel.classList.contains('hidden')) {
        if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        else if (e.key === 'ArrowRight') { 
          e.preventDefault(); 
          if(currentIndex < 24) goNext(); 
          else if(currentIndex === 24 && allAnswered()) handleSubmit(); 
        }
      }
    });

    // 初始状态：显示封面
    resetToCover();
  })();
</script>
</body>
</html>
