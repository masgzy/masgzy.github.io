<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <script src="res/theme.js"></script>
    <style>
        :root {
            --theme-gradient: linear-gradient(135deg, #E8F4F8 0%, #F0E6F0 25%, #E6EAF5 50%, #F5F0E8 75%, #E8F0F5 100%);
            --theme-orb-1: rgba(120, 160, 200, 0.25);
            --theme-orb-1-inner: rgba(120, 160, 200, 0.1);
            --theme-orb-2: rgba(180, 140, 180, 0.25);
            --theme-orb-2-inner: rgba(180, 140, 180, 0.1);
            --theme-primary: #5A6B7A;
            --theme-glass-blur: 40px;
            --theme-glass-bg: rgba(255, 255, 255, 0.5);
            --theme-glass-border: rgba(255, 255, 255, 0.6);
            --theme-glass-shadow: rgba(90, 107, 122, 0.1);
            --radius-lg: 28px;
            --radius-xl: 36px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            min-height: 100vh;
            background: var(--theme-gradient);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -15%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            max-width: 400px;
            max-height: 400px;
            background: radial-gradient(circle, 
                var(--theme-orb-1) 0%, 
                var(--theme-orb-1-inner) 50%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 55vw;
            height: 55vw;
            max-width: 450px;
            max-height: 450px;
            background: radial-gradient(circle, 
                var(--theme-orb-2) 0%, 
                var(--theme-orb-2-inner) 50%,
                transparent 70%
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-card {
            background: var(--theme-glass-bg);
            backdrop-filter: blur(var(--theme-glass-blur)) saturate(150%);
            -webkit-backdrop-filter: blur(var(--theme-glass-blur)) saturate(150%);
            border: 1px solid var(--theme-glass-border);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            box-shadow: 0 8px 32px var(--theme-glass-shadow),
                        inset 0 1px 1px rgba(255, 255, 255, 0.6);
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, 
                rgba(150, 160, 180, 0.1) 0%, 
                transparent 60%
            );
            pointer-events: none;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #5A6B7A, #8B7B8B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #3A3A3A;
            margin-bottom: 12px;
        }

        .error-message {
            font-size: 1rem;
            color: #6A6A6A;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: rgba(90, 107, 122, 0.85);
            color: #fff;
            text-decoration: none;
            border-radius: var(--radius-lg);
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(90, 107, 122, 0.3);
            transition: all 0.2s ease;
        }

        .home-button:hover {
            box-shadow: 0 4px 16px rgba(90, 107, 122, 0.4);
            transform: scale(1.02);
            background: rgba(90, 107, 122, 0.95);
        }

        .home-button svg {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 480px) {
            .error-card {
                padding: 36px 24px;
            }
            
            .error-code {
                font-size: 6rem;
            }
            
            .error-title {
                font-size: 1.25rem;
            }
            
            .error-message {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-card">
            <div class="error-code">404</div>
            <h1 class="error-title">页面未找到</h1>
            <p class="error-message">抱歉，您访问的页面不存在或已被移除</p>
            <a href="/" class="home-button">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                返回首页
            </a>
        </div>
    </div>
</body>
</html>
