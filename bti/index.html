<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/x-icon" href="res/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="res/favicon.svg">
  <link rel="apple-touch-icon" href="res/favicon-180.png">
  <title>XBTI</title>
  <link rel="stylesheet" href="res/design/index.css" />
  <link rel="stylesheet" href="res/index/index.css" />
  <script src="res/design/theme.js"></script>
</head>
<body>
  <!-- 背景装饰圆形 -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  
  <div class="container">
    <header class="page-header">
      <h1 class="page-title">XBTI</h1>
      <p class="page-subtitle">一系列XBTI</p>
    </header>
    <div id="cards-container">
      <div class="card">
        <a class="card-left" href="/sbti">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M5.4 8.4c.9-2.1 2.8-3.3 5.05-3.3 2.15 0 3.35.88 4.1 2.18.55-.28 1.18-.43 1.85-.43 2.1 0 3.7 1.7 3.7 3.9 0 3.9-4.3 6.45-8.1 8.45-3.8-2-8.1-4.55-8.1-8.45 0-.88.55-1.72 1.5-2.35Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
              <path d="M8.1 10.8c.65-.48 1.55-.48 2.2 0M14 10.8c.65-.48 1.55-.48 2.2 0M9.2 14.2c1.5 1.15 4.1 1.15 5.6 0" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" opacity="0.68"/>
              <path d="M5.5 5.2 4.2 3.8M18.5 5.2l1.3-1.4" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" opacity="0.45"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">SBTI</div>
            <div class="card-description">MBTI已经过时，SBTI来了。</div>
          </div>
        </a>
        <a class="card-button" href="/sbti">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="https://sbti.jukilab.com/">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M7 3.8h7l3.2 3.2v13.2H7V3.8Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
              <path d="M14 3.8V7h3.2M9.5 10h5M9.5 13h3.2M9.5 16h5.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.62"/>
              <path d="m18.4 11.1.75 1.55 1.7.25-1.22 1.2.28 1.68-1.51-.8-1.52.8.28-1.68-1.22-1.2 1.7-.25.76-1.55Z" fill="currentColor"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">SBTI Pro Max</div>
            <div class="card-description">SBTI的Pro Max版本，只是有一些注解，其他与原版无异(跳转到外站)</div>
          </div>
        </a>
        <a class="card-button" href="https://sbti.jukilab.com/">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="/hbti">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M4.6 16.3c2.2 1.55 12.6 1.55 14.8 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M8 15.55 9.45 6h5.1L16 15.55" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>
              <path d="M7.35 10.05h9.3" stroke="currentColor" stroke-width="1.65" stroke-linecap="round" opacity="0.6"/>
              <path d="M12 5.25V3.8M10.75 4.55h2.5" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" opacity="0.55"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">HBTI</div>
            <div class="card-description">SBTI已经过时，HATI来了🎩🎩 HATI 帽子工厂 v2.0</div>
          </div>
        </a>
        <a class="card-button" href="/hbti">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="/mathmbti">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M4.5 12h15.8M7 19V4.2" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" opacity="0.58"/>
              <path d="M18.8 10.5 20.3 12l-1.5 1.5M5.5 5.7 7 4.2l1.5 1.5" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round" opacity="0.58"/>
              <path d="M4.8 9.2c1.45-2.45 3.15-2.45 4.6 0l1.9 3.6c1.45 2.45 3.15 2.45 4.6 0l1.9-3.6c.72-1.22 1.5-1.83 2.3-1.83" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
              <circle cx="7" cy="12" r="1" fill="currentColor" opacity="0.5"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">MATHMBTI</div>
            <div class="card-description">测测你是什么样的数学人</div>
          </div>
        </a>
        <a class="card-button" href="/mathmbti">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="https://xpti.pages.dev/">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M12 19.2S5.2 15.05 5.2 9.7c0-2.05 1.55-3.55 3.45-3.55 1.35 0 2.45.72 3.35 2.02.9-1.3 2-2.02 3.35-2.02 1.9 0 3.45 1.5 3.45 3.55 0 5.35-6.8 9.5-6.8 9.5Z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
              <path d="M8.4 12h7.2M10.1 9.8v4.4M13.9 9.8v4.4" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" opacity="0.58"/>
              <circle cx="12" cy="12" r="1.05" fill="currentColor"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">XPTI</div>
            <div class="card-description">MBTI已经过时，是时候来测测你的真实XP了！(注:点击后会跳转xpti作者的站)</div>
          </div>
        </a>
        <a class="card-button" href="https://xpti.pages.dev/">前往</a>
      </div>
      <div class="card">
        <a class="card-left" href="http://qusti.vxni.ink/">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" style="width:24px;height:24px;opacity:0.82" aria-hidden="true">
              <path d="M5 18.5h14M6.5 16.5V10l5.5-3.5 5.5 3.5v6.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M9 16.5v-4h6v4M8.4 10h7.2" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round" opacity="0.62"/>
              <path d="M12 5.5V3.8M10.4 3.8h3.2" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" opacity="0.55"/>
              <circle cx="12" cy="13.9" r="1.1" fill="currentColor" opacity="0.45"/>
            </svg>
          </div>
          <div class="card-text">
            <div class="card-title">QUSTI</div>
            <div class="card-description">青科(青岛科技大学)人格测评(注:点击后会跳转青科的站)</div>
          </div>
        </a>
        <a class="card-button" href="http://qusti.vxni.ink/">前往</a>
      </div>
    </div>

  <script src="res/index/config.js"></script>
  <script src="res/vendor/anime.min.js"></script>
  <script src="res/common/gyroscope.js"></script>
  <script src="res/common/glass-animations.js"></script>
  <script src="res/index/app.js"></script>

</html>
